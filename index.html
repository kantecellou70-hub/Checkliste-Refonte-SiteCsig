<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist — Refonte Site CSIG</title>
  <link rel="icon" type="image/png" href="assets/lynxa-logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="assets/lynxa-logo.png" alt="Lynxa Tech" class="header-logo">
        <div>
          <h1>Refonte Site CSIG</h1>
          <span class="header-subtitle">Suivi des tâches</span>
        </div>
      </div>
      <div class="header-stats">
        <span id="global-stats">0 / 0 tâches</span>
      </div>
      <div class="header-progress">
        <div class="progress-track">
          <div class="progress-fill" id="global-progress-fill"></div>
        </div>
        <span class="progress-value" id="global-progress-value">0%</span>
      </div>
    </div>
  </header>

  <main class="app-main">
    <div class="sections-container" id="sections-container"></div>
    <div class="add-section-wrapper">
      <button class="btn-add-section" id="btn-add-section">
        <span>+</span> Ajouter une section
      </button>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modifier</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <textarea class="modal-input" id="modal-input" rows="3" placeholder="Saisir le texte..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">Annuler</button>
        <button class="btn btn-primary" id="modal-confirm">Confirmer</button>
      </div>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div class="modal-overlay hidden" id="confirm-overlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3 id="confirm-title">Confirmer</h3>
      </div>
      <div class="modal-body">
        <p id="confirm-message"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="confirm-cancel">Annuler</button>
        <button class="btn btn-danger" id="confirm-ok">Supprimer</button>
      </div>
    </div>
  </div>

  <!-- Chat FAB -->
  <button class="chat-fab" id="chat-fab" title="Ouvrir le chat">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span class="chat-badge hidden" id="chat-badge">0</span>
  </button>

  <!-- Chat panel -->
  <div class="chat-panel hidden" id="chat-panel">
    <div class="chat-panel-header">
      <span>Chat équipe</span>
      <div class="chat-panel-header-actions">
        <button class="chat-btn-icon" id="chat-change-name" title="Changer de prénom">&#9998; Prénom</button>
        <button class="chat-btn-icon" id="chat-close" title="Fermer">&#10005;</button>
      </div>
    </div>

    <!-- Écran saisie du prénom -->
    <div class="chat-name-screen" id="chat-name-screen">
      <p>Entrez votre prénom pour rejoindre le chat</p>
      <input class="chat-name-input" type="text" id="chat-name-input" placeholder="Votre prénom…" maxlength="30" autocomplete="off">
      <button class="chat-name-confirm" id="chat-name-confirm">Rejoindre →</button>
    </div>

    <!-- Écran messages -->
    <div class="chat-messages-screen hidden" id="chat-messages-screen">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input class="chat-text-input" type="text" id="chat-text-input" placeholder="Message…" autocomplete="off" maxlength="500">
        <button class="chat-send-btn" id="chat-send">&#10148;</button>
      </div>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Loading overlay -->
  <div id="loading-overlay" style="
    position:fixed; inset:0; background:#f0f2f5;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:9999; gap:14px;">
    <div style="
      width:36px; height:36px; border:4px solid #e4e7ec;
      border-top-color:#FF6200; border-radius:50%;
      animation:spin 0.7s linear infinite;">
    </div>
    <span style="font-size:0.85rem; color:#6b7280; font-family:sans-serif;">Chargement…</span>
  </div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <script src="app.js"></script>
</body>
</html>
